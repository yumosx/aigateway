name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Format
        run: |
          unformatted="$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"
          if [ -n "$unformatted" ]; then
            echo "Go files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Test
        run: go test ./... -v -race -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl -Os https://cli.codecov.io/latest/linux/codecov
          chmod +x codecov
          if [ -n "${CODECOV_TOKEN}" ]; then
            ./codecov --verbose upload-process --disable-search -t "${CODECOV_TOKEN}" -f coverage.out
          else
            ./codecov --verbose upload-process --disable-search -f coverage.out
          fi

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker Compose smoke test
        run: bash scripts/compose_smoke.sh
