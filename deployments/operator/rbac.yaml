apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegisflow-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegisflow-operator
rules:
  - apiGroups: ["aegisflow.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aegisflow-operator
subjects:
  - kind: ServiceAccount
    name: aegisflow-operator
    namespace: default
roleRef:
  kind: ClusterRole
  name: aegisflow-operator
  apiGroup: rbac.authorization.k8s.io
